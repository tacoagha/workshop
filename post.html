<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <main class="page-main">
      <section class="section">
        <div class="container" id="postContainer"></div>
      </section>
    </main>
  </div>
  <script src="js/config.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/blogs.js"></script>
  <script>
    const h = window.helpers
    h.applyTheme(CONFIG.theme)
    h.renderNav("blog.html")
    h.renderFooter()

    function formatDate(dateStr) {
      const d = new Date(dateStr)
      return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })
    }

    const params = new URLSearchParams(window.location.search)
    const id = parseInt(params.get("id"))
    const post = BLOG_POSTS[id]

    const container = document.getElementById("postContainer")

    if (!post) {
      container.innerHTML = `
        <div style="text-align:center;padding:80px 0;">
          <h2 style="font-size:1.5rem;margin-bottom:12px;">Post not found</h2>
          <p style="color:var(--text-muted);margin-bottom:24px;">This post doesn't exist or was removed.</p>
          <a href="blog.html" class="btn btn-primary">&larr; Back to Blog</a>
        </div>
      `
    } else {
      document.title = `${post.title} — ${CONFIG.name}`
      container.innerHTML = `
        <a href="blog.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-size:0.9rem;margin-bottom:32px;transition:color 0.2s;"
           onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-muted)'">
          &larr; Back to Blog
        </a>
        <article style="max-width:720px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <span style="font-size:0.82rem;font-weight:600;color:var(--primary);background:rgba(59,130,246,0.1);padding:4px 12px;border-radius:6px;">
              ${formatDate(post.date)}
            </span>
          </div>
          <h1 style="font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;line-height:1.25;margin-bottom:24px;letter-spacing:-0.02em;">
            ${h.escapeHtml(post.title)}
          </h1>
          <div style="color:var(--text-muted);font-size:1.05rem;line-height:1.8;white-space:pre-wrap;">
            ${h.escapeHtml(post.content)}
          </div>
        </article>
      `
    }

    h.initMobileNav()
  </script>
</body>
</html>
